<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Manager</title>
    <!-- Dummy favicon to prevent 404 -->
    <link rel="icon" href="data:,">
    <!-- Chart.js for Pie Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=9">
</head>
<body>
    <!-- App Container -->
    <div id="app-container">
        <!-- LOGIN VIEW -->
        <section id="login-view" class="view active-view">
            <div class="glass-card login-card">
                <h1>Expense Manager</h1>
                <p>Please enter your PIN to continue</p>
                <div class="input-group">
                    <input type="password" id="pin-input" placeholder="Enter PIN" inputmode="numeric" maxlength="4">
                </div>
                <button id="login-btn" class="primary-btn">Login</button>
                <p id="login-error" class="error-msg"></p>
            </div>
        </section>

        <!-- DASHBOARD VIEW -->
        <section id="dashboard-view" class="view">
            <header class="dashboard-header">
                <h2>Dashboard</h2>
                <button id="logout-btn" class="icon-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </header>

            <div class="summary-cards">
                <div class="glass-card summary-card">
                    <h3>Monthly Spending</h3>
                    <p id="monthly-total">₹0</p>
                </div>
                <div class="glass-card summary-card">
                    <h3>Yearly Spending</h3>
                    <p id="yearly-total">₹0</p>
                </div>
            </div>

            <div class="glass-card chart-card">
                <h3>Last 6 Months Trend</h3>
                <div class="chart-container">
                    <canvas id="trend-chart"></canvas>
                </div>
            </div>

            <div class="glass-card chart-card">
                <h3>This Month's Breakdown</h3>
                <div class="chart-container">
                    <canvas id="category-chart"></canvas>
                </div>
            </div>

            <div class="glass-card recent-card">
                <h3>Recent Expenses</h3>
                <div id="recent-expenses-list">
                    <p class="loading-text">Loading...</p>
                </div>
            </div>

            <!-- Floating Action Button -->
            <button id="fab-add" class="fab">
                <svg viewBox="0 0 24 24" width="30" height="30" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </section>

        <!-- ADD EXPENSE MODAL -->
        <div id="add-modal" class="modal">
            <div class="modal-content glass-card">
                <div class="modal-header">
                    <h2>Add Expense</h2>
                    <button id="close-modal-btn" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <form id="add-expense-form">
                    <div class="input-group">
                        <label for="exp-date">Date</label>
                        <input type="date" id="exp-date" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="exp-amount">Amount</label>
                        <input type="number" id="exp-amount" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="input-group">
                        <label for="exp-account">Paid From</label>
                        <select id="exp-account" required>
                            <option value="" disabled selected>Select account</option>
                            <option value="gopi icici">gopi icici</option>
                            <option value="gopi sbi">gopi sbi</option>
                            <option value="gopi hdfc">gopi hdfc</option>
                            <option value="8002 cc">8002 cc</option>
                            <option value="9003 cc">9003 cc</option>
                            <option value="hdfc cc">hdfc cc</option>
                            <option value="nish sbi">nish sbi</option>
                            <option value="cash">cash</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="exp-category">Expense Category</label>
                        <select id="exp-category" required>
                            <option value="" disabled selected>Select category</option>
                            <option value="vegitable">vegitable</option>
                            <option value="grocery">grocery</option>
                            <option value="utility( GAS, POWER, Water)">utility( GAS, POWER, Water)</option>
                            <option value="rent">rent</option>
                            <option value="gift">gift</option>
                            <option value="travel">travel</option>
                            <option value="office">office</option>
                            <option value="snacks">snacks</option>
                            <option value="dress">dress</option>
                            <option value="badminton">badminton</option>
                            <option value="saanvi expense">saanvi expense</option>
                            <option value="saanvi school fees">saanvi school fees</option>
                            <option value="house maintenance/ repair">house maintenance/ repair</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="exp-desc">Description</label>
                        <input type="text" id="exp-desc" placeholder="What was this for?" required>
                    </div>

                    <button type="submit" id="update-btn" class="primary-btn">Update</button>
                </form>
            </div>
        </div>
        
        <!-- MONTH BREAKDOWN MODAL -->
        <div id="breakdown-modal" class="modal">
            <div class="modal-content glass-card">
                <div class="modal-header">
                    <h2 id="breakdown-month-title">Month Breakdown</h2>
                    <button id="close-breakdown-btn" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="chart-container" style="height: 250px; margin-bottom: 1.5rem;">
                    <canvas id="breakdown-chart"></canvas>
                </div>
                <div id="breakdown-list" style="max-height: 200px; overflow-y: auto;">
                    <!-- Breakdown items injected here -->
                </div>
            </div>
        </div>
        
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="overlay hidden">
            <div class="glass-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem 3rem;">
                <div class="spinner"></div>
                <p id="loading-text" style="margin: 0;">Loading...</p>
            </div>
        </div>

        <!-- SUCCESS MODAL -->
        <div id="success-modal" class="modal">
            <div class="modal-content glass-card" style="text-align: center;">
                <svg viewBox="0 0 24 24" width="48" height="48" stroke="var(--success)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <h2 style="margin-bottom: 0.5rem;">Update Successful</h2>
                <p>Your expense has been added.</p>
                <button id="close-success-btn" class="primary-btn" style="margin-top: 1.5rem;">OK</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=9"></script>
</body>
</html>
